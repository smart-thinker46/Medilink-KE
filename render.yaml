services:
  - type: keyvalue
    name: medilink-redis
    plan: free

  - type: web
    name: medilink-backend
    runtime: node
    plan: free
    region: frankfurt
    rootDir: .
    buildCommand: npm install && npx prisma generate --schema prisma/main.schema.prisma && npm run build
    preDeployCommand: npx prisma migrate deploy --schema prisma/main.schema.prisma
    startCommand: npm run start:prod
    healthCheckPath: /api
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        fromDatabase:
          name: medilink-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: medilink-redis
          property: connectionString

      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: CLIENT_LOGS_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: INTASEND_PUBLISHABLE_KEY
        sync: false
      - key: INTASEND_SECRET_KEY
        sync: false
      - key: INTASEND_CALLBACK_URL
        sync: false
      - key: INTASEND_REDIRECT_URL
        sync: false
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        sync: false

      - key: USD_KES_RATE
        value: "150"
      - key: SUBSCRIPTION_REMINDER_ENABLED
        value: "true"
      - key: SUBSCRIPTION_REMINDER_INTERVAL_MINUTES
        value: "360"

databases:
  - name: medilink-postgres
    plan: free
    databaseName: medilink
    user: medilink_user
