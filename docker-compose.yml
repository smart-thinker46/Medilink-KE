services:
  postgres:
    image: postgres:16-alpine
    container_name: medilink_postgres
    ports:
      - '5435:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-medilink_main}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medilink_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: medilink_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - medilink_net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  medilink_net:
